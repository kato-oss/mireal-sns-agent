name: 03 - Daily Post

on:
  schedule:
    # JST 8:00 = UTC 23:00 前日 / JST 月-土 = UTC 日-金 (0-5)
    - cron: "0 23 * * 0-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run mode"
        type: boolean
        default: true
      force_pillar:
        description: "Force pillar A-E (blank = use calendar)"
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  daily-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Noto CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ inputs.dry_run }}
          FORCE_PILLAR: ${{ inputs.force_pillar }}
          GH_REPO: ${{ github.repository }}
        run: python scripts/agent.py

      - name: Upload generated image (dry run preview)
        if: ${{ inputs.dry_run == true && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-image
          path: data/images/generated/
          retention-days: 7
          if-no-files-found: ignore
