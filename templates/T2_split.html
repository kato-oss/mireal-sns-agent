<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; }
  .canvas { width: 1080px; height: 1080px; display: flex; }
  .photo {
    flex: 0 0 460px; height: 1080px;
    background-image: url('{{bg_url}}');
    background-size: cover; background-position: center;
    position: relative;
  }
  .photo::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(8,28,51,0) 60%, rgba(8,28,51,1) 100%);
  }
  .panel {
    flex: 1; background: #081C33;
    padding: 80px 64px 80px 48px;
    display: flex; flex-direction: column;
    color: #FFFFFF;
  }
  .brand-row {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 80px;
  }
  .brand {
    font-size: 20px; letter-spacing: 6px;
    font-weight: 700;
  }
  .brand-line {
    flex: 0 0 36px; height: 2px; background: #E6FF00;
  }
  .spacer { flex: 1; }
  .heading {
    font-size: 64px; font-weight: 900;
    line-height: 1.18;
    letter-spacing: -1px;
    white-space: pre-line;
  }
  .accent {
    width: 60px; height: 3px;
    background: #E6FF00;
    margin: 32px 0 24px;
  }
  .subheading {
    font-size: 28px; font-weight: 400;
    line-height: 1.65;
    color: rgba(255,255,255,0.85);
    white-space: pre-line;
  }
  .footer {
    margin-top: 36px;
    font-size: 18px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.65);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="photo"></div>
  <div class="panel">
    <div class="brand-row">
      <div class="brand">MIREAL</div>
      <div class="brand-line"></div>
    </div>
    <h1 class="heading">{{heading}}</h1>
    <div class="accent"></div>
    <p class="subheading">{{subheading}}</p>
    <div class="spacer"></div>
    <div class="footer">{{footer}}</div>
  </div>
</div>
</body>
</html>
