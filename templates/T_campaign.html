<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF4E4;
    --cream-soft: #FDF8EC;
    --primary: #3F2718;
    --primary-soft: #5C3D2A;
    --accent: #B8775B;
    --tag-bg: #4D2E1F;
    --tag-text: #F2D8B8;
    --tag-text-soft: #DAB68F;
    --shadow: rgba(63, 39, 24, 0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px; height: 1080px; overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
  }
  .canvas { width: 1080px; height: 1080px; position: relative; }

  /* 3x3 写真コラージュ背景 */
  .photo-grid {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 0;
  }
  .photo-cell {
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .photo-cell::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(63, 39, 24, 0.06);
  }
  .photo-cell.c1 { background-image: url('{{bg_url_0}}'); }
  .photo-cell.c2 { background-image: url('{{bg_url_1}}'); }
  .photo-cell.c3 { background-image: url('{{bg_url_2}}'); }
  .photo-cell.c4 { background-image: url('{{bg_url_3}}'); }
  .photo-cell.c5 { background-image: url('{{bg_url_4}}'); }
  .photo-cell.c6 { background-image: url('{{bg_url_5}}'); }
  .photo-cell.c7 { background-image: url('{{bg_url_6}}'); }
  .photo-cell.c8 { background-image: url('{{bg_url_7}}'); }
  .photo-cell.c9 { background-image: url('{{bg_url_8}}'); }

  /* 中央のクリームカード */
  .center-card {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 760px;
    background: var(--cream);
    border-radius: 32px;
    padding: 64px 56px 56px;
    box-shadow:
      0 25px 60px var(--shadow),
      0 8px 22px rgba(63, 39, 24, 0.12);
    display: flex; flex-direction: column;
    align-items: center;
  }

  /* ブランド行 */
  .brand-row {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 48px;
  }
  .brand-mark {
    width: 44px; height: 44px;
    background: var(--tag-bg);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--cream);
    font-size: 22px; font-weight: 900;
    font-family: 'Noto Serif JP', serif;
    letter-spacing: -1px;
  }
  .brand-x {
    font-size: 32px; color: var(--primary-soft); font-weight: 300;
  }
  .brand-text {
    font-size: 22px; letter-spacing: 6px;
    font-weight: 700; color: var(--primary);
  }

  /* 見出し */
  .heading {
    text-align: center;
    color: var(--primary);
    font-weight: 900;
    line-height: 1.32;
    margin-bottom: 56px;
    letter-spacing: -1px;
  }
  .heading .lead {
    font-size: 48px;
    display: block;
  }
  .heading .accent {
    font-size: 88px;
    color: var(--accent);
    font-family: 'Noto Serif JP', serif;
    line-height: 1.1;
    display: inline-block;
    margin: 8px 0;
  }
  .heading .tail {
    font-size: 48px;
    display: block;
  }

  /* ピル型情報カード */
  .pills {
    display: flex; gap: 20px;
    width: 100%;
    justify-content: center;
  }
  .pill {
    flex: 1;
    background: var(--cream-soft);
    border: 2px solid var(--primary);
    border-radius: 18px;
    padding: 24px 16px 28px;
    display: flex; flex-direction: column; align-items: center;
    position: relative;
    max-width: 320px;
  }
  .pill-tag {
    position: absolute;
    top: -18px;
    background: var(--tag-bg);
    color: var(--cream);
    font-size: 18px;
    font-weight: 700;
    padding: 8px 22px;
    border-radius: 18px;
    letter-spacing: 2px;
  }
  .pill-body {
    color: var(--primary);
    font-size: 30px;
    font-weight: 900;
    line-height: 1.3;
    text-align: center;
    margin-top: 12px;
  }

  /* フッター */
  .footer {
    margin-top: 40px;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--primary-soft);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="photo-grid">
    <div class="photo-cell c1"></div>
    <div class="photo-cell c2"></div>
    <div class="photo-cell c3"></div>
    <div class="photo-cell c4"></div>
    <div class="photo-cell c5"></div>
    <div class="photo-cell c6"></div>
    <div class="photo-cell c7"></div>
    <div class="photo-cell c8"></div>
    <div class="photo-cell c9"></div>
  </div>

  <div class="center-card">
    <div class="brand-row">
      <div class="brand-mark">M</div>
      <div class="brand-x">×</div>
      <div class="brand-text">MIREAL</div>
    </div>

    <h1 class="heading">
      <span class="lead">{{heading_lead}}</span>
      <span class="accent">{{heading_accent}}</span>
      <span class="tail">{{heading_tail}}</span>
    </h1>

    <div class="pills">
      <div class="pill">
        <div class="pill-tag">{{pill1_tag}}</div>
        <div class="pill-body">{{pill1_body}}</div>
      </div>
      <div class="pill">
        <div class="pill-tag">{{pill2_tag}}</div>
        <div class="pill-body">{{pill2_body}}</div>
      </div>
    </div>

    <div class="footer">{{footer}}</div>
  </div>
</div>
</body>
</html>
