<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; }
  .canvas {
    width: 1080px; height: 1080px; position: relative;
    background-image: url('{{bg_url}}');
    background-size: cover; background-position: center;
  }
  .overlay {
    position: absolute; inset: 0;
    background: rgba(8,28,51,0.82);
  }
  .content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 110px;
    color: #FFFFFF; text-align: center;
  }
  .brand {
    font-size: 22px; letter-spacing: 10px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .brand-line {
    width: 48px; height: 3px; background: #E6FF00;
    margin-bottom: 80px;
  }
  .heading {
    font-size: 116px; font-weight: 900;
    line-height: 1.13;
    letter-spacing: -2px;
    white-space: pre-line;
  }
  .accent {
    width: 80px; height: 4px;
    background: #E6FF00;
    margin: 48px 0 40px;
  }
  .subheading {
    font-size: 30px; font-weight: 400;
    line-height: 1.7;
    color: rgba(255,255,255,0.85);
    max-width: 760px;
    white-space: pre-line;
  }
  .footer {
    position: absolute;
    bottom: 70px; left: 0; right: 0;
    text-align: center;
    font-size: 18px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.55);
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="overlay"></div>
  <div class="content">
    <div class="brand">MIREAL</div>
    <div class="brand-line"></div>
    <h1 class="heading">{{heading}}</h1>
    <div class="accent"></div>
    <p class="subheading">{{subheading}}</p>
  </div>
  <div class="footer">{{footer}}</div>
</div>
</body>
</html>
